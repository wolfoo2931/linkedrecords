name: WDIO Tests

permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch:
    inputs: {}
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

env:
  TEST_USERS_PWD: ${{ secrets.TEST_USERS_PWD }}
  TEST_USERS: wolfoo2931+1@gmail.com,wolfoo2931+2@gmail.com,wolfoo2931+3@gmail.com,wolfoo2931+4@gmail.com
  COOKIE_DOMAIN: localhost
  FRONTEND_BASE_URL: http://localhost:3001
  SERVER_BASE_URL: http://localhost:6543
  AUTH_ISSUER_BASE_URL: https://dev-onljhxvyw71o4mbs.us.auth0.com/
  AUTH_CLIENT_ID: Yimcn7S0Dq8bwKPsWsg7W6T7LZSjDLYZ
  AUTH_CLIENT_SECRET: ${{ secrets.AUTH_CLIENT_SECRET }}
  AUTH_COOKIE_SIGNING_SECRET: somesigningsecret
  PADDLE_API_URL: https://sandbox-api.paddle.com
  PADDLE_NOTIFICATION_SECRET: ${{ secrets.PADDLE_NOTIFICATION_SECRET }}
  PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
  QUOTA_COUNT_KV_RECORDS: true
  QUOTA_COUNT_LT_RECORDS: true
  PGUSER: postgres
  PGHOST: localhost
  PGPASSWORD: postgres
  PGDATABASE: ci_db_test

jobs:
  wdio-tests:
    strategy:
      matrix:
        node: [24]
        psql: [15, 17]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:${{ matrix.psql }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_db_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node }}
      - name: WDIO Tests
        env:
          PGPORT: ${{ job.services.postgres.ports[5432] }}
        run: npm run wdio:fast

  wdio-tests-public-client-mode:
    strategy:
      matrix:
        node: [24]
        psql: [17]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:${{ matrix.psql }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_db_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node }}
      - name: WDIO Tests
        env:
          PGPORT: ${{ job.services.postgres.ports[5432] }}
          AUTH_TOKEN_AUDIENCE: localhost:3000
          TEST_AUTH_MODE: public
        run: npm run wdio:fast

  wdio-tests-pglite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
      - name: WDIO Tests (PGlite)
        env:
          USE_PGLITE: 'true'
        run: npm run wdio:fast

  wdio-tests-authentik:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/setup-authentik
      - name: WDIO Tests (Authentik, confidential client mode)
        env:
          USE_PGLITE: 'true'
          TEST_IDP: authentik
          TEST_USERS: alice@example.com,bob@example.com,charlie@example.com,dora@example.com
          AUTH_ISSUER_BASE_URL: http://localhost:9000/application/o/linkedrecords-e2e/
          AUTH_CLIENT_ID: linkedrecords-e2e
          AUTH_CLIENT_SECRET: e2e-test-client-secret-do-not-use-in-prod
        run: npm run wdio:fast
      - name: Show Authentik logs on failure
        if: failure()
        run: docker compose -f .github/actions/setup-authentik/docker-compose.yml logs

  wdio-tests-authentik-public-client-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-deps
      - uses: ./.github/actions/setup-authentik
      - name: WDIO Tests (Authentik, public client mode)
        env:
          USE_PGLITE: 'true'
          TEST_IDP: authentik
          TEST_AUTH_MODE: public
          TEST_USERS: alice@example.com,bob@example.com,charlie@example.com,dora@example.com
          # Each Authentik provider defaults to issuer_mode=per_provider, so the
          # public client's issuer/audience is its own application slug, distinct
          # from the confidential client used above - see .env.authentik.example.
          AUTH_ISSUER_BASE_URL: http://localhost:9000/application/o/linkedrecords-e2e-public/
          AUTH_CLIENT_ID: linkedrecords-e2e-public
          AUTH_TOKEN_AUDIENCE: linkedrecords-e2e-public
        run: npm run wdio:fast
      - name: Show Authentik logs on failure
        if: failure()
        run: docker compose -f .github/actions/setup-authentik/docker-compose.yml logs
